<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>步步花园 MVP 原型</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #25211d;
      --muted: #756f64;
      --soft: #a49a8c;
      --line: #e0d8c9;
      --paper: #fffdf8;
      --cream: #fbf5ea;
      --leaf: #5f9137;
      --leaf-dark: #3f7027;
      --leaf-soft: #e9f4df;
      --gold: #d99520;
      --gold-soft: #ffe2a2;
      --water: #2f86df;
      --water-soft: #e3f2ff;
      --coral: #ef866f;
      --pink: #ffe0d9;
      --shadow: 0 18px 46px rgba(63, 50, 30, 0.14);
      --card-shadow: 0 8px 26px rgba(70, 58, 37, 0.12);
      --radius: 24px;
      font-family: ui-rounded, "SF Pro Rounded", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(255,255,255,0.54) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.48) 1px, transparent 1px),
        #eee7da;
      background-size: 28px 28px;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:disabled {
      cursor: not-allowed;
    }

    .prototype-shell {
      display: grid;
      grid-template-columns: 430px minmax(320px, 460px);
      gap: 34px;
      justify-content: center;
      align-items: start;
      width: min(100%, 1180px);
      margin: 0 auto;
      padding: 24px 18px 40px;
    }

    .stage-label {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      color: #7c7467;
      font-size: 13px;
    }

    .stage-label strong {
      display: block;
      color: var(--ink);
      font-size: 20px;
      line-height: 1.3;
    }

    .phone-frame {
      position: sticky;
      top: 18px;
      width: 430px;
      height: 932px;
      overflow: hidden;
      border: 0;
      border-radius: 0;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 4%, rgba(255,255,255,0.86), transparent 30%),
        linear-gradient(180deg, #fffaf0 0%, #fffdf8 42%, #fbf4e8 100%);
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.26;
      background:
        linear-gradient(90deg, rgba(223,212,190,0.5) 1px, transparent 1px),
        linear-gradient(0deg, rgba(223,212,190,0.44) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .status-bar {
      position: absolute;
      z-index: 30;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 34px 0;
      color: #0c0c0b;
      font-size: 16px;
      font-weight: 800;
      pointer-events: none;
    }

    .signal {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .bars {
      display: inline-flex;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
    }

    .bars span {
      width: 3px;
      border-radius: 2px;
      background: #0c0c0b;
    }

    .bars span:nth-child(1) { height: 6px; }
    .bars span:nth-child(2) { height: 9px; }
    .bars span:nth-child(3) { height: 12px; }
    .bars span:nth-child(4) { height: 14px; }

    .wifi {
      width: 16px;
      height: 11px;
      border: 3px solid #0c0c0b;
      border-bottom: 0;
      border-radius: 16px 16px 0 0;
      transform: scaleX(0.92);
    }

    .battery {
      position: relative;
      width: 25px;
      height: 13px;
      border: 2px solid #0c0c0b;
      border-radius: 4px;
    }

    .battery::before {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 5px;
      border-radius: 2px;
      background: #0c0c0b;
    }

    .battery::after {
      content: "";
      position: absolute;
      top: 3px;
      right: -5px;
      width: 3px;
      height: 5px;
      border-radius: 0 2px 2px 0;
      background: #0c0c0b;
    }

    .screen-inner {
      position: absolute;
      z-index: 2;
      inset: 0;
      overflow-y: auto;
      padding: 72px 20px 116px;
      scrollbar-width: none;
    }

    .screen-inner::-webkit-scrollbar {
      display: none;
    }

    .screen-inner.no-nav {
      padding-bottom: 34px;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 48px;
      margin-bottom: 18px;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-size: 23px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .daisy-logo {
      position: relative;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
    }

    .daisy-logo::before {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #f3bd37 0 15%, transparent 16%),
        conic-gradient(from 0deg, #fff 0 10%, transparent 10% 16%, #fff 16% 26%, transparent 26% 33%, #fff 33% 43%, transparent 43% 50%, #fff 50% 60%, transparent 60% 67%, #fff 67% 77%, transparent 77% 83%, #fff 83% 94%, transparent 94%);
      filter: drop-shadow(0 2px 2px rgba(62, 51, 31, 0.18));
    }

    .daisy-logo::after {
      content: "";
      position: absolute;
      left: 9px;
      bottom: 1px;
      width: 25px;
      height: 18px;
      border-radius: 90% 0 90% 0;
      background: #79a94c;
      transform: rotate(-18deg);
      opacity: 0.92;
    }

    .leaf-dot {
      color: var(--leaf);
      font-size: 18px;
      font-weight: 800;
    }

    .vip-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 36px;
      padding: 6px 14px;
      border: 1px solid #ebb84f;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffe6a9 0%, #ffd47a 100%);
      color: #9b6412;
      font-size: 15px;
      font-weight: 900;
      box-shadow: 0 5px 14px rgba(176, 119, 28, 0.18), inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .vip-crown {
      position: relative;
      width: 18px;
      height: 15px;
    }

    .vip-crown::before {
      content: "";
      position: absolute;
      left: 2px;
      right: 2px;
      bottom: 1px;
      height: 6px;
      border-radius: 1px 1px 4px 4px;
      background: #c88413;
    }

    .vip-crown::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 2px 3px, #c88413 0 2px, transparent 2px),
        radial-gradient(circle at 9px 1px, #c88413 0 2px, transparent 2px),
        radial-gradient(circle at 16px 3px, #c88413 0 2px, transparent 2px),
        linear-gradient(135deg, transparent 0 30%, #c88413 31% 50%, transparent 51%),
        linear-gradient(225deg, transparent 0 30%, #c88413 31% 50%, transparent 51%);
    }

    .page-title {
      margin: 20px 0 8px;
      color: var(--ink);
      font-size: 35px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: 0;
    }

    .page-subtitle {
      margin: 0;
      color: #6f665a;
      font-size: 16px;
      line-height: 1.55;
      font-weight: 560;
    }

    .soft-card,
    .white-card {
      border: 1px solid rgba(214, 205, 187, 0.84);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(14px);
    }

    .soft-card {
      padding: 18px;
    }

    .primary-button,
    .secondary-button,
    .ghost-button,
    .green-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 50px;
      border-radius: 999px;
      font-weight: 900;
      transition: transform 0.16s ease, opacity 0.16s ease, box-shadow 0.16s ease;
    }

    .primary-button {
      background: var(--ink);
      color: #fff;
      box-shadow: 0 9px 18px rgba(37, 33, 29, 0.18);
    }

    .green-button {
      border: 1px solid #70a43d;
      background: linear-gradient(180deg, #8abc42 0%, #5f982b 100%);
      color: #fff;
      box-shadow: 0 9px 18px rgba(77, 124, 35, 0.24), inset 0 2px 0 rgba(255,255,255,0.38);
      text-shadow: 0 2px 3px rgba(54, 79, 21, 0.25);
    }

    .green-button:disabled,
    .primary-button:disabled {
      border-color: #d5cec2;
      background: #eee9df;
      color: #aaa195;
      box-shadow: inset 0 1px 0 #fff, 0 4px 10px rgba(70,58,37,0.08);
      text-shadow: none;
    }

    .secondary-button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      color: var(--ink);
    }

    .ghost-button {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .bottom-nav {
      position: absolute;
      z-index: 25;
      left: 16px;
      right: 16px;
      bottom: 8px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      min-height: 64px;
      padding: 7px 10px;
      border: 1px solid rgba(220, 211, 195, 0.82);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 12px 32px rgba(82, 66, 38, 0.12);
      backdrop-filter: blur(18px);
    }

    .tab-button {
      display: grid;
      place-items: center;
      gap: 3px;
      border-radius: 19px;
      background: transparent;
      color: #766f64;
      font-size: 13px;
      font-weight: 820;
    }

    .tab-button.is-active {
      color: var(--leaf);
    }

    .tab-icon {
      position: relative;
      display: block;
      width: 30px;
      height: 30px;
    }

    .icon-today::before {
      content: "";
      position: absolute;
      left: 13px;
      bottom: 4px;
      width: 4px;
      height: 18px;
      border-radius: 9px;
      background: currentColor;
    }

    .icon-today::after {
      content: "";
      position: absolute;
      left: 6px;
      bottom: 15px;
      width: 18px;
      height: 12px;
      border: 2px solid currentColor;
      border-bottom: 0;
      border-radius: 50% 50% 0 0;
    }

    .icon-atlas::before {
      content: "";
      position: absolute;
      inset: 4px;
      border: 2px solid currentColor;
      border-radius: 7px;
    }

    .icon-atlas::after {
      content: "";
      position: absolute;
      left: 12px;
      top: 8px;
      width: 7px;
      height: 12px;
      border-radius: 8px;
      border: 2px solid currentColor;
      background: transparent;
    }

    .icon-us::before {
      content: "";
      position: absolute;
      left: 10px;
      top: 4px;
      width: 10px;
      height: 10px;
      border: 2px solid currentColor;
      border-radius: 50%;
    }

    .icon-us::after {
      content: "";
      position: absolute;
      left: 6px;
      bottom: 4px;
      width: 18px;
      height: 12px;
      border: 2px solid currentColor;
      border-radius: 16px 16px 4px 4px;
    }

    .onboarding-hero {
      min-height: 478px;
      display: grid;
      align-content: end;
      gap: 22px;
      padding-top: 24px;
    }

    .onboarding-art,
    .home-art,
    .garden-island {
      position: relative;
      overflow: hidden;
      border-radius: 34px;
    }

    .onboarding-art {
      min-height: 318px;
      background:
        radial-gradient(circle at 18% 72%, rgba(143, 181, 76, 0.28) 0 18%, transparent 19%),
        radial-gradient(circle at 88% 20%, rgba(255, 215, 126, 0.44) 0 12%, transparent 13%),
        linear-gradient(180deg, #fff9ec 0%, #f6ead8 100%);
      border: 1px solid #ead8ba;
      box-shadow: var(--card-shadow);
    }

    .window-frame {
      position: absolute;
      left: 26px;
      top: 28px;
      width: 116px;
      height: 152px;
      border: 8px solid rgba(170, 118, 48, 0.42);
      border-radius: 6px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.66);
    }

    .window-frame::before {
      content: "";
      position: absolute;
      top: 50%;
      left: -8px;
      right: -8px;
      height: 8px;
      background: rgba(170, 118, 48, 0.42);
      transform: translateY(-50%);
    }

    .window-frame::after {
      content: "";
      position: absolute;
      left: 50%;
      top: -8px;
      bottom: -8px;
      width: 8px;
      background: rgba(170, 118, 48, 0.42);
      transform: translateX(-50%);
    }

    .plant-scene {
      position: absolute;
      left: 50%;
      bottom: 12px;
      width: 186px;
      height: 246px;
      transform: translateX(-50%);
    }

    .plant-scene.is-small {
      width: 108px;
      height: 132px;
      transform: none;
    }

    .plant {
      position: absolute;
      inset: 0;
    }

    .pot {
      position: absolute;
      left: 34px;
      right: 34px;
      bottom: 0;
      height: 62px;
      border-radius: 0 0 28px 28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.28), transparent 38%),
        #b8753b;
      border: 2px solid rgba(94, 58, 31, 0.5);
      box-shadow: inset 0 -8px 0 rgba(104, 63, 31, 0.16), 0 12px 18px rgba(66, 45, 25, 0.14);
    }

    .pot::before {
      content: "";
      position: absolute;
      left: -10px;
      right: -10px;
      top: -16px;
      height: 28px;
      border-radius: 999px;
      background: #c4864c;
      border: 2px solid rgba(94, 58, 31, 0.42);
    }

    .soil {
      position: absolute;
      left: 35px;
      right: 35px;
      bottom: 51px;
      height: 18px;
      border-radius: 50%;
      background: #4d2f18;
    }

    .stem {
      position: absolute;
      left: 91px;
      bottom: 66px;
      width: 8px;
      height: 116px;
      border-radius: 999px;
      background: linear-gradient(90deg, #4f8d32, #6faa44);
      transform-origin: bottom center;
    }

    .leaf {
      position: absolute;
      width: 56px;
      height: 30px;
      border-radius: 100% 0 100% 0;
      background: linear-gradient(135deg, #7cac53, #d3e9ba);
      border: 1px solid rgba(50, 89, 31, 0.28);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.35);
    }

    .leaf.left {
      left: 43px;
      bottom: 102px;
      transform: rotate(-16deg);
    }

    .leaf.right {
      right: 38px;
      bottom: 126px;
      transform: rotate(48deg);
    }

    .seed-shape {
      position: absolute;
      left: 79px;
      bottom: 65px;
      width: 32px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(180deg, #f7ca55, #cd8b29);
      transform: rotate(-23deg);
    }

    .bud-shape {
      position: absolute;
      left: 72px;
      bottom: 172px;
      width: 46px;
      height: 56px;
      border-radius: 50% 50% 45% 45%;
      background: linear-gradient(180deg, #fff7c8, #efd477);
      border: 1px solid rgba(96, 71, 28, 0.25);
    }

    .flower-head {
      position: absolute;
      left: 54px;
      bottom: 166px;
      width: 82px;
      height: 82px;
    }

    .flower-head::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #e0a51e 0 16%, transparent 17%),
        conic-gradient(from 0deg, #fff 0 9%, transparent 9% 14%, #fff 14% 23%, transparent 23% 29%, #fff 29% 38%, transparent 38% 44%, #fff 44% 53%, transparent 53% 59%, #fff 59% 68%, transparent 68% 74%, #fff 74% 83%, transparent 83% 89%, #fff 89% 98%, transparent 98%);
      filter: drop-shadow(0 3px 5px rgba(55, 39, 18, 0.15));
    }

    .plant[data-stage="seed"] .stem,
    .plant[data-stage="seed"] .leaf,
    .plant[data-stage="seed"] .bud-shape,
    .plant[data-stage="seed"] .flower-head,
    .plant[data-stage="sprout"] .seed-shape,
    .plant[data-stage="sprout"] .bud-shape,
    .plant[data-stage="sprout"] .flower-head,
    .plant[data-stage="bud"] .seed-shape,
    .plant[data-stage="bud"] .flower-head,
    .plant[data-stage="bloom"] .seed-shape,
    .plant[data-stage="bloom"] .bud-shape {
      display: none;
    }

    .plant[data-stage="sprout"] .stem {
      height: 78px;
    }

    .plant[data-stage="sprout"] .leaf.right {
      display: none;
    }

    .plant[data-stage="bud"] .stem {
      height: 118px;
    }

    .plant-scene.is-small .plant {
      transform: scale(0.56);
      transform-origin: left bottom;
    }

    .home-art {
      height: 405px;
      margin: -4px -20px 0;
      border-radius: 0;
      background:
        radial-gradient(circle at 17% 50%, rgba(118, 164, 68, 0.32) 0 19%, transparent 20%),
        radial-gradient(circle at 78% 38%, rgba(129, 175, 83, 0.18) 0 18%, transparent 19%),
        linear-gradient(112deg, rgba(255,255,255,0.38), transparent 28%),
        linear-gradient(180deg, #fff7e8 0%, #f4e9d2 62%, #cbdcbd 100%);
    }

    .home-art::before {
      content: "";
      position: absolute;
      left: 0;
      top: 90px;
      width: 120px;
      height: 190px;
      border: 8px solid rgba(160, 112, 48, 0.34);
      border-left: 0;
      background: rgba(255,255,255,0.24);
    }

    .home-art::after {
      content: "";
      position: absolute;
      right: -26px;
      bottom: 82px;
      width: 128px;
      height: 98px;
      border: 8px solid rgba(110, 125, 115, 0.44);
      border-radius: 14px 14px 28px 28px;
      transform: rotate(-15deg);
      opacity: 0.7;
    }

    .home-art .plant-scene {
      bottom: 32px;
      transform: translateX(-50%) scale(0.82);
    }

    .stage-pill {
      position: absolute;
      left: 50%;
      top: 82px;
      z-index: 4;
      transform: translateX(-50%);
      min-height: 36px;
      padding: 7px 16px;
      border-radius: 999px;
      border: 1px solid rgba(97, 146, 72, 0.32);
      background: rgba(231, 245, 220, 0.86);
      color: var(--leaf-dark);
      font-size: 15px;
      font-weight: 900;
      box-shadow: 0 5px 13px rgba(66, 105, 40, 0.12);
      backdrop-filter: blur(10px);
    }

    .today-card {
      position: relative;
      z-index: 5;
      margin: -124px 0 0;
      padding: 14px 22px 18px;
      border-radius: 26px;
    }

    .flower-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(221, 213, 198, 0.8);
    }

    .flower-thumb {
      position: relative;
      flex: 0 0 auto;
      width: 54px;
      height: 54px;
      border: 1px solid #eadfcf;
      border-radius: 15px;
      background: linear-gradient(180deg, #fff9ed, #f9efd9);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .flower-thumb::before {
      content: "";
      position: absolute;
      left: 22px;
      bottom: 9px;
      width: 4px;
      height: 25px;
      border-radius: 9px;
      background: var(--leaf);
    }

    .flower-thumb::after {
      content: "";
      position: absolute;
      left: 13px;
      top: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #dca31e 0 20%, transparent 21%),
        conic-gradient(#fff 0 12%, transparent 12% 17%, #fff 17% 29%, transparent 29% 34%, #fff 34% 46%, transparent 46% 51%, #fff 51% 63%, transparent 63% 68%, #fff 68% 80%, transparent 80% 85%, #fff 85% 97%, transparent 97%);
      filter: drop-shadow(0 2px 2px rgba(66,51,27,0.12));
    }

    .flower-title {
      flex: 1;
      display: grid;
      gap: 3px;
    }

    .flower-title strong {
      color: #10100f;
      font-size: 26px;
      line-height: 1;
      font-weight: 950;
    }

    .flower-title span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .chevron {
      color: #776d61;
      font-size: 32px;
      line-height: 1;
    }

    .steps-block {
      margin-top: 14px;
    }

    .label {
      display: block;
      color: #776f64;
      font-size: 16px;
      font-weight: 760;
    }

    .steps-number {
      display: flex;
      align-items: baseline;
      gap: 9px;
      margin: 3px 0 14px;
    }

    .steps-number strong {
      color: #080807;
      font-size: 46px;
      line-height: 0.92;
      font-weight: 950;
      letter-spacing: -1px;
    }

    .steps-number span {
      color: #655d52;
      font-size: 22px;
      font-weight: 720;
    }

    .segmented-progress {
      display: grid;
      grid-template-columns: repeat(var(--segments), 1fr);
      gap: 3px;
      margin: 8px 0 8px;
    }

    .segment {
      display: grid;

          <button class="control-button" data-steps="0" type="button">0</button>
          <button class="control-button" data-steps="999" type="button">999</button>
          <button class="control-button" data-steps="1000" type="button">1000</button>
          <button class="control-button" data-steps="1999" type="button">1999</button>
          <button class="control-button" data-steps="2000" type="button">2000</button>
          <button class="control-button" data-steps="3000" type="button">3000</button>
        </div>
      </section>
      <section class="control-card">
        <h2>用户版本</h2>
        <div class="control-grid">
          <button class="control-button" id="freePlanButton" type="button">免费</button>
          <button class="control-button" id="premiumPlanButton" type="button">VIP</button>
          <button class="control-button" id="authToggleButton" type="button">授权</button>
        </div>
      </section>
      <section class="control-card">
        <h2>页面/状态</h2>
        <div class="control-grid">
          <button class="control-button" data-screen="onboarding" type="button">启动</button>
          <button class="control-button" data-screen="health" type="button">授权页</button>
          <button class="control-button" data-screen="today" type="button">今日</button>
          <button class="control-button" data-screen="atlas" type="button">图鉴</button>
          <button class="control-button" id="widgetPreviewButton" type="button">小组件</button>
          <button class="control-button" id="syncDelayButton" type="button">同步延迟</button>
        </div>
      </section>
      <section class="control-card">
        <h2>当前状态</h2>
        <div class="state-list" id="stateList"></div>
      </section>
      <section class="control-card">
        <button class="secondary-button" id="resetButton" type="button">重置原型</button>
      </section>
    </aside>
  </main>

  <script>
    const STORAGE_KEY = "stepGardenMvpPrototypeStateV2";
    const STEPS_PER_WATERING = 1000;
    const FREE_DAILY_CAP = 2000;
    const VIP_DAILY_CAP = 3000;
    const WATERINGS_PER_FLOWER = 4;

    const STAGES = [
      { id: "seed", label: "种子", summary: "刚刚种下，等待第一次浇水唤醒。" },
      { id: "sprout", label: "幼苗", summary: "叶片长出，花开始建立生命力。" },
      { id: "bud", label: "花苞", summary: "花苞形成，继续浇水就会接近绽放。" },
      { id: "bloom", label: "绽放", summary: "花已经绽放，可以种进花园收藏。" }
    ];

    const gardens = [
      {
        id: "dew",
        name: "晨露花园",
        isSpecial: false,
        flowers: ["小雏菊", "蓝铃花", "晨光草", "蜜糖花", "橘风铃", "云边花", "雪绒花", "小蔷薇", "雨点兰", "星点草", "金盏花", "玻璃玫瑰"]
      },
      {
        id: "creek",
        name: "溪畔花园",
        isSpecial: false,
        flowers: ["溪石花", "苔影兰", "青豆芽", "水纹菊", "芦叶花", "小睡莲", "银露草", "风铃藤", "浅蓝鸢尾", "月白花", "琥珀莲", "星河藤"]
      },
      {
        id: "star",
        name: "星光温室",
        isSpecial: true,
        flowers: ["夜灯花", "星砂草", "蓝月兰", "银边菊", "云母藤", "柔光蔷薇", "霜点草", "灯芯花", "薄雾莲", "晚安花", "金星花", "水晶兰"]
      }
    ];

    const defaultState = {
      screen: "onboarding",
      authorized: false,
      hasSeenIntro: false,
      plan: "free",
      todaySteps: 1420,
      usedWateringsToday: 0,
      currentGardenIndex: 0,
      atlasGardenIndex: 0,
      selectedGardenIndex: 0,
      selectedFlowerIndex: 0,
      currentFlower: {
        gardenId: "dew",
        flowerIndex: 0,
        growth: 0
      },
      progress: {
        dew: [],
        creek: [],
        star: []
      },
      modal: null,
      modalPayload: {}
    };

    let state = loadState();
    let toastTimer = null;
    let atlasSwipeStart = null;

    const screenInner = document.getElementById("screenInner");
    const navLayer = document.getElementById("navLayer");
    const modalLayer = document.getElementById("modalLayer");
    const toast = document.getElementById("toast");
    const stateList = document.getElementById("stateList");

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || localStorage.getItem("stepGardenWireframeState"));
        if (!saved) return structuredClone(defaultState);
        const next = {
          ...structuredClone(defaultState),
          ...saved,
          currentFlower: {
            ...defaultState.currentFlower,
            ...(saved.currentFlower || {}),
            growth: saved.currentFlower?.growth ?? Math.min(WATERINGS_PER_FLOWER, Math.floor((saved.currentFlower?.drops || 0) / 3))
          },
          progress: {
            ...defaultState.progress,
            ...(saved.progress || {})
          },
          modal: null,
          modalPayload: {}
        };
        if (!saved.screen) {
          if (!next.authorized) next.screen = "onboarding";
          else if (saved.tab === "atlas") next.screen = "atlas";
          else if (saved.tab === "garden") next.screen = "garden";
          else if (saved.tab === "pay") next.screen = "us";
          else next.screen = "today";
        }
        next.usedWateringsToday = Math.min(next.usedWateringsToday || 0, wateringsFromStepsFor(next.todaySteps || 0, next.plan || "free"));
        return next;
      } catch {
        return structuredClone(defaultState);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function saveAndRender() {
      saveState();
      render();
    }

    function capForPlan(plan = state.plan) {
      return plan === "premium" ? VIP_DAILY_CAP : FREE_DAILY_CAP;
    }

    function acceptedSteps(steps = state.todaySteps) {
      return Math.min(Math.max(0, steps), capForPlan());
    }

    function wateringsFromStepsFor(steps, plan) {
      const cap = plan === "premium" ? VIP_DAILY_CAP : FREE_DAILY_CAP;
      return Math.floor(Math.min(Math.max(0, steps), cap) / STEPS_PER_WATERING);
    }

    function wateringsFromSteps(steps = state.todaySteps) {
      return wateringsFromStepsFor(steps, state.plan);
    }

    function todayAvailableWaterings() {
      return Math.max(0, wateringsFromSteps() - state.usedWateringsToday);
    }

    function stepsUntilNextWatering() {
      const cap = capForPlan();
      if (state.todaySteps >= cap) return 0;
      const nextTarget = Math.min(cap, (Math.floor(state.todaySteps / STEPS_PER_WATERING) + 1) * STEPS_PER_WATERING);
      return Math.max(0, nextTarget - state.todaySteps);
    }

    function stageFromGrowth(growth = state.currentFlower.growth) {
      if (growth >= WATERINGS_PER_FLOWER) return STAGES[3];
      if (growth >= 2) return STAGES[2];
      if (growth >= 1) return STAGES[1];
      return STAGES[0];
    }

    function currentGarden() {
      return gardens[state.currentGardenIndex] || gardens[0];
    }

    function currentFlowerName() {
      return flowerName(state.currentFlower.gardenId, state.currentFlower.flowerIndex);
    }

    function flowerName(gardenId, index) {
      const garden = gardens.find((item) => item.id === gardenId) || gardens[0];
      return garden.flowers[index] || garden.flowers[0];
    }

    function gardenById(gardenId) {
      return gardens.find((item) => item.id === gardenId) || gardens[0];
    }

    function completedCount(gardenId, onlyFree = false) {
      const ids = state.progress[gardenId] || [];
      return ids.filter((id) => !onlyFree || id < 10).length;
    }

    function isGardenUnlocked(index) {
      const garden = gardens[index];
      if (!garden) return false;
      if (index === 0) return true;
      if (garden.isSpecial && state.plan !== "premium") return false;
      const previous = gardens[index - 1];
      return completedCount(previous.id, true) >= 10;
    }

    function nextFlowerForGarden(gardenId) {
      const done = state.progress[gardenId] || [];
      const max = state.plan === "premium" ? 12 : 10;
      for (let index = 0; index < max; index += 1) {
        if (!done.includes(index)) return index;
      }
      return null;
    }

    function normalizeCurrentFlower() {
      const garden = currentGarden();
      const done = state.progress[state.currentFlower.gardenId] || [];
      const max = state.plan === "premium" ? 12 : 10;
      const invalidPremium = state.currentFlower.flowerIndex >= max;
      const alreadyCollected = done.includes(state.currentFlower.flowerIndex);
      if (state.currentFlower.gardenId === garden.id && !invalidPremium && !alreadyCollected) return;
      const nextIndex = nextFlowerForGarden(garden.id) ?? 0;
      state.currentFlower = { gardenId: garden.id, flowerIndex: nextIndex, growth: 0 };
    }

    function showToast(message) {
      window.clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.add("is-visible");
      toastTimer = window.setTimeout(() => toast.classList.remove("is-visible"), 1800);
    }

    function showModal(type, payload = {}) {
      state.modal = type;
      state.modalPayload = payload;
      saveAndRender();
    }

    function closeModal() {
      state.modal = null;
      state.modalPayload = {};
      saveAndRender();
    }

    function topBarMarkup() {
      return `
        <header class="app-header">
          <div class="brand-mark">
            <span class="daisy-logo" aria-hidden="true"></span>
            <span>步步花园</span><span class="leaf-dot">·</span>
          </div>
          <button class="vip-pill" id="vipHeaderButton" type="button">
            <span class="vip-crown" aria-hidden="true"></span>
            VIP
          </button>
        </header>
      `;
    }

    function bottomNavMarkup() {
      const tabs = [
        ["today", "今日", "icon-today"],
        ["atlas", "图鉴", "icon-atlas"],
        ["us", "我们", "icon-us"]
      ];
      return `
        <nav class="bottom-nav" aria-label="底部导航">
          ${tabs.map(([screen, label, icon]) => `
            <button class="tab-button ${activeTab() === screen ? "is-active" : ""}" data-tab="${screen}" type="button">
              <span class="tab-icon ${icon}" aria-hidden="true"></span>
              <span>${label}</span>
            </button>
          `).join("")}
        </nav>
      `;
    }

    function activeTab() {
      if (["atlas", "garden", "flower", "nextFlower", "gardenComplete"].includes(state.screen)) return "atlas";
      if (state.screen === "us") return "us";
      return "today";
    }

    function plantMarkup(stageId = stageFromGrowth().id) {
      return `
        <div class="plant-scene">
          <div class="plant" data-stage="${stageId}">
            <div class="seed-shape"></div>
            <div class="stem"></div>
            <div class="leaf left"></div>
            <div class="leaf right"></div>
            <div class="bud-shape"></div>
            <div class="flower-head"></div>
            <div class="soil"></div>
            <div class="pot"></div>
          </div>
        </div>
      `;
    }

    function stepSegmentsMarkup() {
      const cap = capForPlan();
      const accepted = acceptedSteps();
      const segments = cap / STEPS_PER_WATERING;
      return `
        <div class="segmented-progress" style="--segments: ${segments}">
          ${Array.from({ length: segments }, (_, index) => {
            const start = index * STEPS_PER_WATERING;
            const fill = Math.max(0, Math.min(1, (accepted - start) / STEPS_PER_WATERING)) * 100;
            const earned = fill >= 100;
            return `
              <div class="segment">
                <span class="drop-icon ${earned ? "is-earned" : ""}" aria-hidden="true"></span>
                <div class="track-shell"><div class="track-fill" style="width: ${fill}%"></div></div>
                <span class="segment-label ${earned ? "" : "is-muted"}">${STEPS_PER_WATERING}</span>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function flowerStripMarkup(gardenId, count = 10) {
      const done = state.progress[gardenId] || [];
      return `
        <div class="flower-strip" aria-label="花园收集进度">
          ${Array.from({ length: count }, (_, index) => `<span class="flower-dot ${done.includes(index) ? "is-done" : ""}"></span>`).join("")}
        </div>
      `;
    }

    function renderOnboarding() {
      navLayer.innerHTML = "";
      screenInner.classList.add("no-nav");
      screenInner.innerHTML = `
        ${topBarMarkup()}
        <section class="onboarding-hero">
          <div class="onboarding-art">
            <span class="window-frame"></span>
            ${plantMarkup("bloom")}
          </div>
          <div>
            <h1 class="page-title">每天走路，养出一座花园。</h1>
            <p class="page-subtitle">步步花园会把 Apple Health 的每日步数变成浇水机会。每 1000 步浇一次，慢慢收集不同花园。</p>
          </div>
        </section>
        <div class="button-row">
          <button class="secondary-button" id="previewButton" type="button">先看看</button>
          <button class="green-button" id="startHealthButton" type="button">开启步数授权</button>
        </div>
      `;
    }

    function renderHealth() {
      navLayer.innerHTML = "";
      screenInner.classList.add("no-nav");
      screenInner.innerHTML = `
        ${topBarMarkup()}
        <section class="auth-card">
          <div>
            <h1 class="page-title">授权步数，开始养花。</h1>
            <p class="page-subtitle">我们只读取 Apple Health 的每日步数，用来生成浇水机会；不会读取位置、心率或路线。</p>
          </div>
          <div class="soft-card">
            <div class="privacy-list">
              <div class="privacy-row"><span class="privacy-icon">1</span><span>每日步数用于计算浇水机会</span></div>
              <div class="privacy-row"><span class="privacy-icon">2</span><span>免费每日采纳 2000 步，VIP 采纳 3000 步</span></div>
              <div class="privacy-row"><span class="privacy-icon">3</span><span>拒绝授权后仍可浏览图鉴，但花不会成长</span></div>
            </div>
            <div class="notice-card">App Store 审核提示：权限弹窗前先解释用途，并提供稍后授权入口。</div>
          </div>
        </section>
        <div class="button-row">
          <button class="secondary-button" id="authDenyButton" type="button">暂不授权</button>
          <button class="green-button" id="authButton" type="button">连接 Apple Health</button>
        </div>
      `;
    }

    function renderToday() {
      normalizeCurrentFlower();
      const stage = stageFromGrowth();
      const cap = capForPlan();
      const accepted = acceptedSteps();
      const earned = wateringsFromSteps();
      const available = todayAvailableWaterings();
      const bloomed = state.currentFlower.growth >= WATERINGS_PER_FLOWER;
      const canWater = state.authorized && available > 0 && !bloomed;
      let buttonLabel = "继续走路";
      let disabled = true;

      if (!state.authorized) {
        buttonLabel = "去授权 Apple Health";
        disabled = false;
      } else if (bloomed) {
        buttonLabel = "查看绽放";
        disabled = false;
      } else if (canWater) {
        buttonLabel = "点击浇水";
        disabled = false;
      } else if (state.todaySteps < cap) {
        buttonLabel = `还差 ${stepsUntilNextWatering()} 步`;
      } else if (state.todaySteps >= cap || earned <= state.usedWateringsToday) {
        buttonLabel = "今日浇完";
      }

      screenInner.classList.remove("no-nav");
      navLayer.innerHTML = bottomNavMarkup();
      screenInner.innerHTML = `
        ${topBarMarkup()}
        <section class="home-art">
          <button class="stage-pill" data-stage-info="${stage.id}" type="button">${stage.label}</button>
          ${plantMarkup(stage.id)}
        </section>
        <section class="today-card white-card">
          <button class="flower-row" id="currentFlowerButton" type="button">
            <span class="flower-thumb" aria-hidden="true"></span>
            <span class="flower-title">
              <strong>${currentFlowerName()}</strong>
              <span>${stage.label}${state.currentFlower.growth === 3 ? " · 还差 1 次绽放" : ""}</span>
            </span>
            <span class="chevron">›</span>
          </button>
          <div class="steps-block">
            <span class="label">今日步数</span>
            <div class="steps-number">
              <strong>${state.todaySteps}</strong>
              <span>/ ${cap} 步</span>
            </div>
            ${stepSegmentsMarkup()}
            <div class="rule-copy"><span class="rule-leaf" aria-hidden="true"></span><span>每达成 ${STEPS_PER_WATERING} 步，获得 1 次浇水机会</span></div>
            ${!state.authorized ? `<div class="notice-card">需要授权 Apple Health 后，花才能根据步数成长。</div>` : ""}
            ${state.authorized && state.todaySteps === 0 ? `<div class="notice-card">今天还没有同步到步数。走满 1000 步后，水壶会自动装满。</div>` : ""}
            ${state.authorized && !bloomed && available <= 0 && state.todaySteps > 0 && state.todaySteps < cap ? `<div class="notice-card">还差 ${stepsUntilNextWatering()} 步，水壶就会装满。</div>` : ""}
            ${state.authorized && state.plan === "free" && state.todaySteps >= FREE_DAILY_CAP ? `<div class="notice-card">免费用户今日已采纳 ${FREE_DAILY_CAP} 步。VIP 可采纳 ${VIP_DAILY_CAP} 步。</div>` : ""}
            <button class="green-button" id="canActionButton" type="button" ${disabled ? "disabled" : ""}>
              <span class="can-mini" aria-hidden="true"></span>${buttonLabel}
            </button>
            <p class="page-subtitle" style="margin-top: 12px;">已采纳 ${accepted} 步 · 今日获得 ${earned} 次机会 · 剩余 ${available} 次</p>
          </div>
        </section>
      `;
    }

    function renderAtlas() {
      const index = Math.max(0, Math.min(gardens.length - 1, state.atlasGardenIndex));
      state.atlasGardenIndex = index;
      const garden = gardens[index];
      const freeDone = completedCount(garden.id, true);
      const unlocked = isGardenUnlocked(index);
      const current = index === state.currentGardenIndex;
      const actionText = unlocked ? current ? "查看花园" : "进入花园" : garden.isSpecial && state.plan !== "premium" ? "解锁 VIP" : "先完成上一片";

      screenInner.classList.remove("no-nav");
      navLayer.innerHTML = bottomNavMarkup();
      screenInner.innerHTML = `
        ${topBarMarkup()}
        <section class="garden-copy">
          <h1 class="page-title">花园图鉴 <span class="leaf-dot">·</span></h1>
          <p class="page-subtitle">收集 10 朵普通花，开启下一片花园。</p>
        </section>
        <section class="atlas-carousel">
          <button class="atlas-arrow is-left" data-atlas-delta="-1" type="button" aria-label="上一个花园">‹</button>
          <div class="garden-island ${unlocked ? "" : "is-locked"}">
            <span class="garden-gate"></span>
            <span class="garden-sign">${garden.name}</span>
          </div>
          <button class="atlas-arrow is-right" data-atlas-delta="1" type="button" aria-label="下一个花园">›</button>
          <section class="atlas-panel white-card">
            <h2>${garden.name}</h2>
            <p>${unlocked ? current ? "当前花园" : "已解锁" : garden.isSpecial ? "VIP 特殊花园" : "未解锁"} · <strong style="color: var(--leaf)">${freeDone}</strong> / 10 普通花</p>
            ${flowerStripMarkup(garden.id)}
            <button class="${unlocked ? "green-button" : "secondary-button"}" id="atlasActionButton" data-garden-index="${index}" type="button">${actionText}</button>
            <div class="atlas-dots">${gardens.map((_, dot) => `<span class="atlas-dot ${dot === index ? "is-active" : ""}"></span>`).join("")}</div>
          </section>
        </section>
      `;
    }

    function renderGarden() {
      const garden = currentGarden();
      const freeDone = completedCount(garden.id, true);
      const complete = freeDone >= 10;

      screenInner.classList.remove("no-nav");
      navLayer.innerHTML = bottomNavMarkup();
      screenInner.innerHTML = `
        ${topBarMarkup()}
        <div class="subpage-bar">
          <button class="back-button" id="backToAtlasButton" type="button">‹ 图鉴</button>
          <span class="mini-pill">${garden.isSpecial ? "特殊花园" : "当前花园"}</span>
        </div>
        <section class="detail-title">
          <h1>${garden.name}</h1>
          <p>${freeDone} / 10 朵普通花 · 集满后开启下一片花园</p>
        </section>
        <div class="garden-island" style="height: 250px; margin: 10px -10px -6px;">
          <span class="garden-gate"></span>
          <span class="garden-sign">${garden.name}</span>
        </div>
        <section class="garden-grid">
          ${garden.flowers.map((name, index) => {
            const done = (state.progress[garden.id] || []).includes(index);
            const isPremium = index >= 10;
            const locked = isPremium && state.plan !== "premium";
            const current = state.currentFlower.gardenId === garden.id && state.currentFlower.flowerIndex === index;
            return `
              <button class="garden-slot ${current ? "is-current" : ""} ${locked ? "is-locked" : ""}" data-slot="${index}" type="button">
                ${isPremium ? `<span class="vip-tag">VIP</span>` : ""}
                <span class="slot-visual ${done ? "is-flower" : locked ? "" : "is-shadow"}">${locked ? "VIP" : ""}</span>
                <span>${name}</span>
              </button>
            `;
          }).join("")}
        </section>
        ${complete ? `
          <section class="notice-card">
            <strong>${garden.name}已完成</strong>
            <span>普通花已集齐，可以进入下一片花园。</span>
            <button class="green-button" id="nextGardenButton" type="button">进入下一花园</button>
          </section>
        ` : ""}
      `;
    }

    function renderFlowerDetail() {
      const garden = gardens[state.selectedGardenIndex] || currentGarden();
      const flowerIndex = state.selectedFlowerIndex;
      const isCurrent = state.currentFlower.gardenId === garden.id && state.currentFlower.flowerIndex === flowerIndex;
      const collected = (state.progress[garden.id] || []).includes(flowerIndex);
      const locked = flowerIndex >= 10 && state.plan !== "premium";
      const stage = isCurrent ? stageFromGrowth() : collected ? STAGES[3] : STAGES[0];

      screenInner.classList.remove("no-nav");
      navLayer.innerHTML = bottomNavMarkup();
      screenInner.innerHTML = `
        ${topBarMarkup()}
        <div class="subpage-bar">
          <button class="back-button" id="backToGardenButton" type="button">‹ 花园</button>
          <span class="mini-pill">${garden.name}</span>
        </div>
        <section class="flower-detail-art">
          ${plantMarkup(stage.id)}
        </section>
        <section class="detail-card white-card">
          <div class="detail-title">
            <h1>${flowerName(garden.id, flowerIndex)}</h1>
            <p>${collected ? "已收集" : isCurrent ? "正在养成" : locked ? "VIP 限定花" : "未收集"} · ${stage.label}</p>
          </div>
          <div class="stage-list">
            ${STAGES.map((item) => `<button class="stage-token ${item.id === stage.id ? "is-active" : ""}" data-stage-info="${item.id}" type="button">${item.label}</button>`).join("")}
          </div>
          <p class="page-subtitle">这个品种共有 4 种形态。每完成 1 次浇水，形态会向下一阶段推进。</p>
          <div class="button-row">
            <button class="secondary-button" id="backToGardenButton2" type="button">返回花园</button>
            ${locked ? `<button class="green-button" data-vip-reason="解锁 VIP 限定花" type="button">解锁 VIP</button>`
              : isCurrent ? `<button class="green-button" data-screen="today" type="button">继续养成</button>`
              : collected ? `<button class="green-button" data-screen="atlas" type="button">查看图鉴</button>`
              : `<button class="green-button" data-pick-flower="${flowerIndex}" type="button">设为下一朵</button>`}
          </div>
        </section>
      `;
    }

    function renderNextFlower() {
      const garden = currentGarden();
      screenInner.classList.remove("no-nav");
      navLayer.innerHTML = bottomNavMarkup();
      screenInner.innerHTML = `
        ${topBarMarkup()}
        <div class="subpage-bar">
          <button class="back-button" id="backToGardenButton" type="button">‹ 花园</button>
          <span class="mini-pill">选择下一朵</span>
        </div>
        <section class="detail-title">
          <h1>种下一朵花</h1>
          <p>${garden.name} · 选择一个未收集的品种继续养成。</p>
        </section>
        <section class="garden-grid">
          ${garden.flowers.map((name, index) => {
            const done = (state.progress[garden.id] || []).includes(index);
            const isPremium = index >= 10;
            const locked = isPremium && state.plan !== "premium";
            return `
              <button class="garden-slot ${locked ? "is-locked" : ""}" data-pick-flower="${index}" type="button" ${done ? "disabled" : ""}>
                ${isPremium ? `<span class="vip-tag">VIP</span>` : ""}
                <span class="slot-visual ${done ? "is-flower" : locked ? "" : "is-shadow"}">${locked ? "VIP" : ""}</span>
                <span>${done ? "已收集 · " : ""}${name}</span>
              </button>
            `;
          }).join("")}
        </section>
      `;
    }

    function renderBloom() {
      navLayer.innerHTML = "";
      screenInner.classList.add("no-nav");
      screenInner.innerHTML = `
        ${topBarMarkup()}
        <section class="completion-hero">
          ${plantMarkup("bloom")}
          <h1>${currentFlowerName()}绽放了</h1>
          <p class="page-subtitle">所属花园：${gardenById(state.currentFlower.gardenId).name}<br>新增图鉴：等待种进花园</p>
          <div class="button-row">
            <button class="secondary-button" id="bloomAtlasButton" type="button">查看图鉴</button>
            <button class="green-button" id="bloomNextButton" type="button">种下一朵</button>
          </div>
        </section>
      `;
    }

    function renderGardenComplete() {
      const garden = currentGarden();
      navLayer.innerHTML = bottomNavMarkup();
      screenInner.classList.remove("no-nav");
      screenInner.innerHTML = `
        ${topBarMarkup()}
        <section class="completion-hero">
          <div class="garden-island" style="height: 330px; margin: 0 -10px;">
            <span class="garden-gate"></span>
            <span class="garden-sign">${garden.name}</span>
          </div>
          <h1>${garden.name}完成</h1>
          <p class="page-subtitle">已收集 10 朵普通花，下一片花园已开放。</p>
          <div class="button-row">
            <button class="secondary-button" data-screen="garden" type="button">留在这里</button>
            <button class="green-button" id="nextGardenButton" type="button">进入下一花园</button>
          </div>
        </section>
      `;
    }

    function renderUs() {
      const premium = state.plan === "premium";
      screenInner.classList.remove("no-nav");
      navLayer.innerHTML = bottomNavMarkup();
      screenInner.innerHTML = `
        ${topBarMarkup()}
        <section class="us-page">
          <button class="deal-card" id="upgradeButton" type="button">
            <span class="deal-visual" aria-hidden="true"></span>
            <span class="deal-copy">
              <span>${premium ? "已开启" : "限时特惠"}</span>
              <strong>${premium ? "高级版已解锁" : "买断仅需 ¥28.00"}</strong>
              <small>每日 3000 步上限 · 限定花 · 特殊花园</small>
            </span>
          </button>

          <section class="settings-list">
            <button class="settings-row" data-toast="反馈入口已记录" type="button">
              <span class="settings-icon" style="--icon-bg: #d9ebcf;">信</span>
              <span>反馈与建议</span>
              <span class="settings-arrow">›</span>
            </button>
            <button class="settings-row" data-toast="协议与隐私二级入口待设计" type="button">
              <span class="settings-icon" style="--icon-bg: #dbeaf8;">隐</span>
              <span>协议与隐私</span>
              <span class="settings-arrow">›</span>
            </button>
            <button class="settings-row" data-toast="数据备份会在后续版本开放" type="button">
              <span class="settings-icon" style="--icon-bg: #fae4a6;">云</span>
              <span>数据备份</span>
              <span class="settings-arrow">›</span>
            </button>
            <button class="settings-row" data-toast="步步花园，一个轻量步数养花原型" type="button">
              <span class="settings-icon" style="--icon-bg: #e5daf4;">i</span>
              <span>关于我们</span>
              <span class="settings-arrow">›</span>
            </button>
          </section>

          <section class="share-card">
            <div>
              <p>感谢支持独立开发团队</p>
              <button class="share-button" data-toast="分享卡片已准备好" type="button">分享我们</button>
            </div>
            <div class="share-visual" aria-hidden="true"></div>
          </section>

          <section class="products-card">
            <h2>我们的其他作品</h2>
            <div class="product-grid">
              <button class="product-item" data-toast="罐头冥想" type="button">
                <span class="product-icon" style="--product-bg: #2f69d9;">想</span>
                <span>罐头冥想</span>
              </button>
              <button class="product-item" data-toast="目标罐头" type="button">
                <span class="product-icon" style="--product-bg: #f5d24e;">✓</span>
                <span>目标罐头</span>
              </button>
              <button class="product-item" data-toast="手帐罐头" type="button">
                <span class="product-icon" style="--product-bg: #ffc92e;">记</span>
                <span>手帐罐头</span>
              </button>
            </div>
          </section>
        </section>
      `;
    }

    function renderModal() {
      modalLayer.classList.toggle("is-open", Boolean(state.modal));
      if (!state.modal) {
        modalLayer.innerHTML = "";
        return;
      }

      if (state.modal === "stageInfo") {
        const stage = STAGES.find((item) => item.id === state.modalPayload.stageId) || stageFromGrowth();
        modalLayer.innerHTML = `
          <article class="modal-card">
            <h2>${stage.label}</h2>
            <p>${currentFlowerName()}共有 4 种形态：种子、幼苗、花苞、绽放。</p>
            <p>${stage.summary}</p>
            <button class="green-button" id="closeModalButton" type="button">知道了</button>
          </article>
        `;
        return;
      }

      if (state.modal === "watered") {
        const stage = stageFromGrowth();
        modalLayer.innerHTML = `
          <article class="modal-card">
            <h2>浇水成功</h2>
            <p>${currentFlowerName()}现在是「${stage.label}」。${state.currentFlower.growth === 3 ? "再浇 1 次就会绽放。" : "继续走路可以获得下一次浇水机会。"}</p>
            <button class="green-button" id="closeModalButton" type="button">继续</button>
          </article>
        `;
        return;
      }

      if (state.modal === "vip") {
        modalLayer.innerHTML = `
          <article class="modal-card">
            <h2>解锁 VIP</h2>
            <p>${state.modalPayload.reason || "让花园成长更快，也解锁更多收藏。"}</p>
            <div class="benefit-list">
              <span>每日采纳上限：2000 步 -> 3000 步</span>
              <span>每天最多 2 次浇水 -> 3 次浇水</span>
              <span>解锁每个花园的 2 朵 VIP 限定花</span>
              <span>解锁特殊花园</span>
            </div>
            <div class="button-row">
              <button class="secondary-button" id="restorePurchaseButton" type="button">恢复购买</button>
              <button class="green-button" id="confirmVipButton" type="button">买断 ¥28.00</button>
            </div>
            <button class="ghost-button" id="closeModalButton" type="button" style="margin-top: 10px;">暂时不用</button>
          </article>
        `;
        return;
      }

      if (state.modal === "healthDenied") {
        modalLayer.innerHTML = `
          <article class="modal-card">
            <h2>还没有步数权限</h2>
            <p>你仍然可以浏览图鉴，但今日步数不会变成浇水机会。之后可以回到授权页重新连接 Apple Health。</p>
            <div class="button-row">
              <button class="secondary-button" id="closeModalButton" type="button">稍后</button>
              <button class="green-button" data-screen="health" type="button">去授权</button>
            </div>
          </article>
        `;
        return;
      }

      if (state.modal === "widget") {
        modalLayer.innerHTML = `
          <article class="modal-card">
            <h2>小组件预览</h2>
            <p>桌面小组件会显示今日步数、当前花状态和剩余浇水机会。</p>
            <div class="soft-card" style="margin: 12px 0;">
              <div class="flower-row" style="border:0;padding:0;">
                <span class="flower-thumb"></span>
                <span class="flower-title"><strong>${state.todaySteps} 步</strong><span>${currentFlowerName()} · ${stageFromGrowth().label} · 剩 ${todayAvailableWaterings()} 次</span></span>
              </div>
            </div>
            <button class="green-button" id="closeModalButton" type="button">知道了</button>
          </article>
        `;
        return;
      }

      if (state.modal === "syncDelay") {
        modalLayer.innerHTML = `
          <article class="modal-card">
            <h2>步数同步中</h2>
            <p>Apple Health 的步数可能会有轻微延迟。同步完成后，首页会自动按 ${STEPS_PER_WATERING} 步换算浇水机会。</p>
            <button class="green-button" id="closeModalButton" type="button">知道了</button>
          </article>
        `;
      }
    }

    function renderControls() {
      if (!stateList) return;
      const garden = currentGarden();
      stateList.innerHTML = `
        <div><span>Health 授权</span><strong>${state.authorized ? "已授权" : "未授权"}</strong></div>
        <div><span>用户版本</span><strong>${state.plan === "premium" ? "VIP" : "免费"}</strong></div>
        <div><span>每日采纳上限</span><strong>${capForPlan()} 步</strong></div>
        <div><span>今日机会</span><strong>${wateringsFromSteps()} 次</strong></div>
        <div><span>剩余机会</span><strong>${todayAvailableWaterings()} 次</strong></div>
        <div><span>当前花</span><strong>${currentFlowerName()}</strong></div>
        <div><span>成长阶段</span><strong>${stageFromGrowth().label}</strong></div>
        <div><span>当前花园</span><strong>${garden.name}</strong></div>
        <div><span>花园进度</span><strong>${completedCount(garden.id, true)} / 10</strong></div>
      `;
      document.getElementById("freePlanButton")?.classList.toggle("is-active", state.plan === "free");
      document.getElementById("premiumPlanButton")?.classList.toggle("is-active", state.plan === "premium");
      document.getElementById("authToggleButton")?.classList.toggle("is-active", state.authorized);
    }

    function render() {
      switch (state.screen) {
        case "onboarding": renderOnboarding(); break;
        case "health": renderHealth(); break;
        case "atlas": renderAtlas(); break;
        case "garden": renderGarden(); break;
        case "flower": renderFlowerDetail(); break;
        case "nextFlower": renderNextFlower(); break;
        case "bloom": renderBloom(); break;
        case "gardenComplete": renderGardenComplete(); break;
        case "us": renderUs(); break;
        default: renderToday();
      }
      renderModal();
      renderControls();
    }

    function setScreen(screen) {
      state.screen = screen;
      if (screen === "atlas") state.atlasGardenIndex = state.currentGardenIndex;
      saveAndRender();
    }

    function setTab(screen) {
      if (screen === "today") state.screen = "today";
      if (screen === "atlas") {
        state.screen = "atlas";
        state.atlasGardenIndex = state.currentGardenIndex;
      }
      if (screen === "us") state.screen = "us";
      saveAndRender();
    }

    function waterFlower() {
      if (!state.authorized) {
        state.screen = "health";
        saveAndRender();
        return;
      }
      if (todayAvailableWaterings() <= 0 || state.currentFlower.growth >= WATERINGS_PER_FLOWER) return;
      state.usedWateringsToday += 1;
      state.currentFlower.growth += 1;
      if (state.currentFlower.growth >= WATERINGS_PER_FLOWER) {
        state.screen = "bloom";
        showToast(`${currentFlowerName()}绽放了`);
      } else {
        state.modal = "watered";
      }
      saveAndRender();
    }

    function collectCurrentFlower(nextScreen = "garden") {
      if (state.currentFlower.growth < WATERINGS_PER_FLOWER) return;
      const gardenId = state.currentFlower.gardenId;
      const flowerIndex = state.currentFlower.flowerIndex;
      const done = state.progress[gardenId] || [];
      if (!done.includes(flowerIndex)) {
        state.progress[gardenId] = [...done, flowerIndex].sort((a, b) => a - b);
      }
      const gardenIndex = gardens.findIndex((item) => item.id === gardenId);
      state.currentGardenIndex = Math.max(0, gardenIndex);
      const freeDone = completedCount(gardenId, true);
      if (freeDone >= 10 && nextScreen !== "garden") {
        state.screen = "gardenComplete";
        saveAndRender();
        return;
      }
      const nextIndex = nextFlowerForGarden(gardenId);
      state.currentFlower = { gardenId, flowerIndex: nextIndex ?? flowerIndex, growth: 0 };
      state.screen = nextScreen;
      saveAndRender();
    }

    function pickFlower(index) {
      const garden = currentGarden();
      if (index >= 10 && state.plan !== "premium") {
        showModal("vip", { reason: "这是一朵 VIP 限定花。" });
        return;
      }
      if ((state.progress[garden.id] || []).includes(index)) return;
      state.currentFlower = { gardenId: garden.id, flowerIndex: index, growth: 0 };
      state.screen = "today";
      showToast(`已选择${flowerName(garden.id, index)}`);
      saveAndRender();
    }

    function openFlowerDetail(index) {
      const garden = currentGarden();
      state.selectedGardenIndex = state.currentGardenIndex;
      state.selectedFlowerIndex = index;
      state.screen = "flower";
      saveAndRender();
    }

    function enterAtlasGarden(index) {
      const garden = gardens[index];
      if (!garden) return;
      if (!isGardenUnlocked(index)) {
        if (garden.isSpecial && state.plan !== "premium") {
          showModal("vip", { reason: "解锁 VIP 后可进入特殊花园。" });
        } else {
          showToast("先完成上一片花园");
        }
        return;
      }
      state.currentGardenIndex = index;
      state.atlasGardenIndex = index;
      normalizeCurrentFlower();
      state.screen = "garden";
      saveAndRender();
    }

    function goNextGarden() {
      const nextIndex = state.currentGardenIndex + 1;
      if (!gardens[nextIndex]) {
        state.screen = "atlas";
        saveAndRender();
        return;
      }
      if (!isGardenUnlocked(nextIndex)) {
        showToast("下一片花园还没有开放");
        return;
      }
      state.currentGardenIndex = nextIndex;
      state.atlasGardenIndex = nextIndex;
      const nextGarden = currentGarden();
      state.currentFlower = { gardenId: nextGarden.id, flowerIndex: nextFlowerForGarden(nextGarden.id) ?? 0, growth: 0 };
      state.screen = "garden";
      showToast(`进入${nextGarden.name}`);
      saveAndRender();
    }

    function moveAtlas(delta) {
      state.atlasGardenIndex = (state.atlasGardenIndex + delta + gardens.length) % gardens.length;
      saveAndRender();
    }

    document.addEventListener("pointerdown", (event) => {
      if (state.screen !== "atlas" || !event.target.closest(".atlas-carousel")) return;
      atlasSwipeStart = { x: event.clientX, y: event.clientY };
    });

    document.addEventListener("pointerup", (event) => {
      if (state.screen !== "atlas" || !atlasSwipeStart) return;
      const deltaX = event.clientX - atlasSwipeStart.x;
      const deltaY = event.clientY - atlasSwipeStart.y;
      atlasSwipeStart = null;
      if (Math.abs(deltaX) < 46 || Math.abs(deltaY) > 80) return;
      moveAtlas(deltaX < 0 ? 1 : -1);
    });

    document.addEventListener("click", (event) => {
      const target = event.target.closest("button");
      if (!target) return;

      if (target.dataset.toast) {
        showToast(target.dataset.toast);
        return;
      }

      if (target.dataset.screen) {
        setScreen(target.dataset.screen);
        return;
      }

      if (target.dataset.tab) {
        setTab(target.dataset.tab);
        return;
      }

      if (target.dataset.steps) {
        state.todaySteps = Number(target.dataset.steps);
        state.usedWateringsToday = Math.min(state.usedWateringsToday, wateringsFromSteps());
        saveAndRender();
        return;
      }

      if (target.dataset.stageInfo) {
        showModal("stageInfo", { stageId: target.dataset.stageInfo });
        return;
      }

      if (target.dataset.vipReason) {
        showModal("vip", { reason: target.dataset.vipReason });
        return;
      }

      if (target.dataset.pickFlower) {
        pickFlower(Number(target.dataset.pickFlower));
        return;
      }

      if (target.id === "startHealthButton") {
        state.hasSeenIntro = true;
        state.screen = "health";
        saveAndRender();
        return;
      }

      if (target.id === "previewButton") {
        state.hasSeenIntro = true;
        state.screen = "today";
        saveAndRender();
        return;
      }

      if (target.id === "authButton") {
        state.authorized = true;
        state.hasSeenIntro = true;
        state.screen = "today";
        showToast("Apple Health 已连接");
        saveAndRender();
        return;
      }

      if (target.id === "authDenyButton") {
        state.authorized = false;
        state.hasSeenIntro = true;
        state.screen = "today";
        state.modal = "healthDenied";
        saveAndRender();
        return;
      }

      if (target.id === "canActionButton") {
        if (!state.authorized) {
          state.screen = "health";
          saveAndRender();
        } else if (state.currentFlower.growth >= WATERINGS_PER_FLOWER) {
          state.screen = "bloom";
          saveAndRender();
        } else if (todayAvailableWaterings() > 0) {
          waterFlower();
        } else if (state.plan === "free" && state.todaySteps >= FREE_DAILY_CAP) {
          showModal("vip", { reason: "今日免费浇水机会已用完，VIP 每天可采纳 3000 步。" });
        } else {
          showToast(`还差 ${stepsUntilNextWatering()} 步`);
        }
        return;
      }

      if (target.id === "currentFlowerButton") {
        state.selectedGardenIndex = gardens.findIndex((item) => item.id === state.currentFlower.gardenId);
        state.selectedFlowerIndex = state.currentFlower.flowerIndex;
        state.screen = "flower";
        saveAndRender();
        return;
      }

      if (target.id === "atlasActionButton") {
        enterAtlasGarden(Number(target.dataset.gardenIndex));
        return;
      }

      if (target.dataset.atlasDelta) {
        moveAtlas(Number(target.dataset.atlasDelta));
        return;
      }

      if (target.id === "backToAtlasButton") {
        state.screen = "atlas";
        state.atlasGardenIndex = state.currentGardenIndex;
        saveAndRender();
        return;
      }

      if (target.id === "backToGardenButton" || target.id === "backToGardenButton2") {
        state.screen = "garden";
        saveAndRender();
        return;
      }

      if (target.dataset.slot) {
        const index = Number(target.dataset.slot);
        if (index >= 10 && state.plan !== "premium") {
          showModal("vip", { reason: "这是一朵 VIP 限定花。" });
          return;
        }
        openFlowerDetail(index);
        return;
      }

      if (target.id === "bloomNextButton") {
        collectCurrentFlower("nextFlower");
        return;
      }

      if (target.id === "bloomAtlasButton") {
        collectCurrentFlower("garden");
        return;
      }

      if (target.id === "nextGardenButton") {
        goNextGarden();
        return;
      }

      if (target.id === "vipHeaderButton" || target.id === "upgradeButton") {
        showModal("vip", { reason: "升级后每天最多 3 次浇水，并解锁限定花和特殊花园。" });
        return;
      }

      if (target.id === "confirmVipButton" || target.id === "premiumPlanButton") {
        state.plan = "premium";
        state.modal = null;
        showToast("VIP 已开启");
        saveAndRender();
        return;
      }

      if (target.id === "freePlanButton") {
        state.plan = "free";
        state.usedWateringsToday = Math.min(state.usedWateringsToday, wateringsFromSteps());
        showToast("已切回免费版");
        saveAndRender();
        return;
      }

      if (target.id === "authToggleButton") {
        state.authorized = !state.authorized;
        showToast(state.authorized ? "已模拟授权" : "已取消授权");
        saveAndRender();
        return;
      }

      if (target.id === "restorePurchaseButton") {
        showToast("恢复购买入口占位");
        return;
      }

      if (target.id === "widgetPreviewButton") {
        showModal("widget");
        return;
      }

      if (target.id === "syncDelayButton") {
        showModal("syncDelay");
        return;
      }

      if (target.id === "closeModalButton") {
        closeModal();
        return;
      }

      if (target.id === "resetButton") {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem("stepGardenWireframeState");
        state = structuredClone(defaultState);
        showToast("原型已重置");
        render();
      }
    });

    render();
  </script>
</body>
</html>
